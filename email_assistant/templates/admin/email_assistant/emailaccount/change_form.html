{% extends "admin/change_form.html" %}

{% block after_field_sets %}
{{ block.super }}
<script>
(function(){
  document.addEventListener('DOMContentLoaded', function(){
    var ta = document.querySelector('textarea[name="signature"]');
    if (!ta) return;
    ta.style.display = 'none';

    var wrap = document.createElement('div');
    wrap.style.cssText = 'border:1px solid var(--border-strong,#2a3f55);border-radius:8px;overflow:hidden;margin-top:4px';

    var toolbar = document.createElement('div');
    toolbar.style.cssText = 'display:flex;gap:3px;flex-wrap:wrap;padding:6px 8px;border-bottom:1px solid var(--border-strong,#2a3f55);background:var(--bg-input,#141f2b)';
    toolbar.innerHTML = [
      ['bold','<b>B</b>','Жирний'],
      ['italic','<i>I</i>','Курсив'],
      ['underline','<u>U</u>','Підкреслений'],
      ['strikeThrough','<s>S</s>','Закреслений'],
    ].map(function(x){
      return '<button type="button" title="'+x[2]+'" style="border:none;background:none;cursor:pointer;color:var(--text-muted,#9aafbe);padding:3px 8px;border-radius:4px;font-size:13px;font-weight:500;line-height:1.4" onmousedown="return mvFmtAcc(\''+x[0]+'\')">' + x[1] + '</button>';
    }).join('') +
    '<span style="width:1px;background:var(--border-strong,#2a3f55);margin:2px 4px;align-self:stretch"></span>' +
    '<select onchange="mvFmtVAcc(\'fontSize\',this.value);this.value=\'\'" style="padding:2px 5px;border-radius:4px;border:1px solid var(--border-strong,#2a3f55);background:var(--bg-input,#141f2b);color:var(--text-muted,#9aafbe);font-size:12px;cursor:pointer"><option value="">Розмір</option><option value="1">8</option><option value="2">10</option><option value="3">12</option><option value="4">14</option><option value="5">18</option><option value="6">24</option></select>' +
    '<select onchange="mvFmtVAcc(\'fontName\',this.value);this.value=\'\'" style="padding:2px 5px;border-radius:4px;border:1px solid var(--border-strong,#2a3f55);background:var(--bg-input,#141f2b);color:var(--text-muted,#9aafbe);font-size:12px;cursor:pointer"><option value="">Шрифт</option><option value="Arial">Arial</option><option value="Times New Roman">Times</option><option value="Courier New">Courier</option><option value="Georgia">Georgia</option></select>' +
    '<input type="color" onchange="mvFmtVAcc(\'foreColor\',this.value)" title="Колір" style="width:26px;height:24px;border-radius:4px;border:1px solid var(--border-strong,#2a3f55);padding:1px;cursor:pointer;background:var(--bg-input,#141f2b)">' +
    '<span style="width:1px;background:var(--border-strong,#2a3f55);margin:2px 4px;align-self:stretch"></span>' +
    '<button type="button" style="border:none;background:none;cursor:pointer;color:var(--text-muted,#9aafbe);padding:3px 8px;border-radius:4px;font-size:12px" onmousedown="return mvFmtAcc(\'removeFormat\')">✕ Очистити</button>';

    var editor = document.createElement('div');
    editor.contentEditable = 'true';
    editor.style.cssText = 'min-height:100px;padding:10px 12px;font-size:13px;line-height:1.7;color:var(--text,#c9d8e4);outline:none;background:var(--bg-card,#1a2535);word-break:break-word';
    editor.innerHTML = ta.value || '';

    window.mvFmtAcc  = function(cmd){ document.execCommand(cmd,false,null); editor.focus(); return false; };
    window.mvFmtVAcc = function(cmd,val){ document.execCommand(cmd,false,val); editor.focus(); };

    ta.form && ta.form.addEventListener('submit', function(){ ta.value = editor.innerHTML; });
    editor.addEventListener('input', function(){ ta.value = editor.innerHTML; });

    wrap.appendChild(toolbar);
    wrap.appendChild(editor);
    ta.parentNode.insertBefore(wrap, ta.nextSibling);
  });

  // Sync All widget button — streams NDJSON progress
  window.doSyncAll = async function(pk) {
    var btn = document.getElementById('sync-all-btn');
    var st  = document.getElementById('sync-all-status');
    var log = document.getElementById('sync-all-log');
    btn.disabled = true; btn.style.opacity = '.5';
    st.textContent = '⏳ Запускаю синхронізацію…'; st.style.color = 'var(--text-muted)';
    log.textContent = ''; log.style.display = 'block';

    function addLine(text) {
      log.textContent += text + '\n';
      log.scrollTop = log.scrollHeight;
    }
    function replaceLast(text) {
      var t = log.textContent;
      var i = t.lastIndexOf('\n', t.length - 2);
      log.textContent = (i >= 0 ? t.substring(0, i + 1) : '') + text + '\n';
      log.scrollTop = log.scrollHeight;
    }

    var csrf = (document.cookie.match(/csrftoken=([^;]+)/) || [])[1] || '';
    try {
      var r = await fetch('/admin/email_assistant/emailaccount/' + pk + '/sync-all/', {
        method: 'POST', headers: {'X-CSRFToken': csrf},
      });
      var reader = r.body.getReader();
      var decoder = new TextDecoder();
      var buf = '';
      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buf += decoder.decode(chunk.value, {stream: true});
        var lines = buf.split('\n');
        buf = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var raw = lines[i].trim();
          if (!raw) continue;
          try {
            var d = JSON.parse(raw);
            if (d.type === 'step') {
              st.textContent = d.msg; addLine(d.msg);
            } else if (d.type === 'inbox_done') {
              replaceLast('📥 Вхідні/Надіслані: +' + d.created + ' нових');
            } else if (d.type === 'folders_found') {
              addLine('📂 Додаткових папок: ' + d.count + (d.names && d.names.length ? ' (' + d.names.join(', ') + ')' : ''));
            } else if (d.type === 'folder_start') {
              st.textContent = '⏳ ' + d.folder;
              addLine('  ⏳ ' + d.folder + '…');
            } else if (d.type === 'folder_done') {
              replaceLast('  ✓ ' + d.folder + ': +' + d.created + ' нових');
            } else if (d.type === 'folder_error') {
              replaceLast('  ⚠️ ' + d.folder + ': ' + d.error);
            } else if (d.type === 'error') {
              addLine('⚠️ Помилка: ' + d.msg);
              st.textContent = '✗ ' + d.msg; st.style.color = 'var(--err,#e53935)';
            } else if (d.type === 'done') {
              var total = (d.inbox_new || 0) + (d.extra_new || 0);
              addLine('');
              addLine('✅ Готово. Всього нових листів: ' + total);
              st.textContent = '✓ Синхронізовано, нових: ' + total;
              st.style.color = 'var(--ok,#2e7d32)';
            }
          } catch(e) {}
        }
      }
    } catch(e) {
      st.textContent = '✗ Помилка мережі'; st.style.color = 'var(--err,#e53935)';
      addLine('⚠️ ' + e.message);
    }
    btn.disabled = false; btn.style.opacity = '1';
  };
})();
</script>
{% endblock %}
