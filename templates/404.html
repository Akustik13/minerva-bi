<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Сторінку не знайдено | Minerva</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080b0f;
      color: #c9d8e4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .wrap { text-align: center; padding: 40px 20px; max-width: 480px; }
    .code {
      font-size: 120px; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, #c9a84c, #e8d5a3);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -4px;
    }
    .icon { font-size: 48px; margin: 12px 0 20px; }
    h1 { font-size: 22px; font-weight: 700; color: #e6edf3; margin-bottom: 10px; }
    p  { font-size: 14px; color: #607d8b; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block; padding: 11px 28px;
      background: linear-gradient(135deg, #1a2e4a, #1e3a5f);
      border: 1px solid #2a4a6a; border-radius: 8px;
      color: #58a6ff; font-size: 14px; font-weight: 600;
      text-decoration: none;
      transition: background .15s, border-color .15s;
    }
    .btn:hover { background: linear-gradient(135deg, #1e3a5f, #1a4a80); border-color: #2196f3; }
    .divider {
      margin: 40px auto; width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    }
    .brand { font-size: 12px; color: #3a5570; margin-top: 32px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <div class="icon">🔍</div>
  <h1>Сторінку не знайдено</h1>
  <p>Запитувана сторінка не існує або була переміщена.<br>
     Перевірте URL або поверніться до головної.</p>
  <a href="/admin/" class="btn">← Повернутись до адмін-панелі</a>
  <div class="divider"></div>
  <div class="brand">🏛️ Minerva Business Intelligence</div>
</div>
</body>
</html>
