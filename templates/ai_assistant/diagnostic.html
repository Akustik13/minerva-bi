{% extends "admin/base_site.html" %}
{% load i18n %}

{% block title %}AI Tools Diagnostic{% endblock %}
{% block content_title %}<h1>🔧 Діагностика AI Tools</h1>{% endblock %}

{% block content %}
<style>
.diag-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
  margin-top: 16px;
}
.diag-card {
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.diag-card-head {
  display: flex;
  align-items: center;
  gap: 8px;
}
.diag-name {
  font-weight: 600;
  font-size: .9rem;
  font-family: monospace;
  color: var(--text);
  flex: 1;
}
.diag-status {
  font-size: .75rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  white-space: nowrap;
}
.diag-status-idle    { background: var(--border-strong); color: var(--text-muted); }
.diag-status-running { background: #1a6b9a; color: #fff; }
.diag-status-ok      { background: #1a6b3a; color: #a0f0b0; }
.diag-status-err     { background: #6b1a1a; color: #f0a0a0; }
.diag-desc {
  font-size: .8rem;
  color: var(--text-muted);
  line-height: 1.4;
}
.diag-run-btn {
  align-self: flex-start;
  background: var(--primary, #417690);
  color: #fff;
  border: none;
  border-radius: 5px;
  padding: 4px 12px;
  font-size: .8rem;
  cursor: pointer;
  transition: opacity .15s;
}
.diag-run-btn:hover { opacity: .85; }
.diag-run-btn:disabled { opacity: .4; cursor: default; }
.diag-result {
  display: none;
  background: var(--bg-input, #141f2b);
  border: 1px solid var(--border-strong);
  border-radius: 5px;
  padding: 8px;
  font-size: .73rem;
  font-family: monospace;
  color: var(--text-muted);
  max-height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}
.diag-timing {
  font-size: .72rem;
  color: var(--text-dim);
}
.diag-bar {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.diag-run-all-btn {
  background: #2a6040;
  color: #a0f0b0;
  border: none;
  border-radius: 6px;
  padding: 6px 18px;
  font-size: .85rem;
  cursor: pointer;
  font-weight: 600;
}
.diag-run-all-btn:hover { opacity: .85; }
.diag-summary {
  font-size: .82rem;
  color: var(--text-muted);
}
</style>

<div class="diag-bar">
  <button class="diag-run-all-btn" onclick="diagRunAll()">▶ Запустити всі</button>
  <span class="diag-summary" id="diag-summary"></span>
</div>

<div class="diag-grid" id="diag-grid">
{% for tool in tools %}
<div class="diag-card" id="card-{{ tool.name }}">
  <div class="diag-card-head">
    <span class="diag-name">{{ tool.name }}</span>
    <span class="diag-status diag-status-idle" id="status-{{ tool.name }}">idle</span>
  </div>
  <div class="diag-desc">{{ tool.description }}</div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="diag-run-btn" onclick="diagRun('{{ tool.name }}')">▶ Run</button>
    <span class="diag-timing" id="timing-{{ tool.name }}"></span>
  </div>
  <pre class="diag-result" id="result-{{ tool.name }}"></pre>
</div>
{% endfor %}
</div>

<script>
const DIAG_URL = '{% url "ai_assistant:diagnostic_run" %}';
const CSRF = '{{ csrf_token }}';

async function diagRun(toolName, input) {
  input = input || {};
  const statusEl  = document.getElementById('status-' + toolName);
  const resultEl  = document.getElementById('result-' + toolName);
  const timingEl  = document.getElementById('timing-' + toolName);
  const btn       = document.querySelector('#card-' + toolName + ' .diag-run-btn');

  statusEl.className = 'diag-status diag-status-running';
  statusEl.textContent = '…';
  if (btn) btn.disabled = true;
  resultEl.style.display = 'none';

  try {
    const resp = await fetch(DIAG_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
      body: JSON.stringify({tool: toolName, input: input}),
    });
    const data = await resp.json();
    const result = data.result || {};
    const ms = data.ms || 0;
    const isErr = !!result.error;

    statusEl.className = 'diag-status ' + (isErr ? 'diag-status-err' : 'diag-status-ok');
    statusEl.textContent = isErr ? 'error' : 'ok';
    timingEl.textContent = ms + ' ms';
    resultEl.textContent = JSON.stringify(result, null, 2);
    resultEl.style.display = 'block';
  } catch(e) {
    statusEl.className = 'diag-status diag-status-err';
    statusEl.textContent = 'error';
    resultEl.textContent = String(e);
    resultEl.style.display = 'block';
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function diagRunAll() {
  const cards = document.querySelectorAll('.diag-card');
  const names = Array.from(cards).map(c => c.id.replace('card-', ''));
  const summaryEl = document.getElementById('diag-summary');
  summaryEl.textContent = `Запуск ${names.length} інструментів…`;

  let ok = 0, err = 0;
  for (const name of names) {
    await diagRun(name);
    const st = document.getElementById('status-' + name);
    if (st && st.textContent === 'ok') ok++;
    else err++;
  }
  summaryEl.textContent = `✅ ${ok} успішно  ❌ ${err} помилок`;
}
</script>
{% endblock %}
