{% extends "admin/base_site.html" %}
{% load i18n %}

{% block title %}Скидання пароля{% endblock %}

{% block content %}
<div style="max-width:420px;margin:60px auto;background:var(--bg-card,#161b22);
            border:1px solid var(--border-strong,#2a3f52);border-radius:10px;padding:32px 36px;">
  <h1 style="font-size:18px;font-weight:700;color:var(--text,#e6edf3);margin:0 0 8px;">
    🔑 Скидання пароля
  </h1>
  <p style="font-size:13px;color:var(--text-muted,#9aafbe);margin:0 0 24px;">
    Введіть email вашого акаунту. Ми надішлемо посилання для скидання пароля.
  </p>
  <form method="post">
    {% csrf_token %}
    <div style="margin-bottom:16px;">
      <label style="display:block;font-size:12px;color:var(--text-muted,#9aafbe);margin-bottom:6px;">
        Email
      </label>
      <input type="email" name="email" autofocus required
             style="width:100%;box-sizing:border-box;padding:9px 12px;
                    background:var(--bg-input,#111c26);border:1px solid var(--border-strong,#2a3f52);
                    border-radius:6px;color:var(--text,#e6edf3);font-size:14px;">
    </div>
    <button type="submit"
            style="width:100%;padding:10px;background:var(--accent,#58a6ff);
                   border:none;border-radius:6px;color:#fff;font-size:14px;
                   font-weight:600;cursor:pointer;">
      Надіслати посилання
    </button>
  </form>
  <p style="text-align:center;margin-top:16px;font-size:12px;">
    <a href="/admin/login/" style="color:var(--text-muted,#9aafbe);text-decoration:none;">
      ← Повернутись до входу
    </a>
  </p>
</div>
{% endblock %}
