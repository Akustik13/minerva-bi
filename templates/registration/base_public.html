<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Minerva{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0f;--bg2:#0e1018;--bg3:#141720;--border:rgba(255,255,255,0.08);
--accent:#00d4aa;--accent2:#4f8fff;--text:#dde2ec;--muted:#6b7280;--err:#ff6b6b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
min-height:100vh;display:flex;flex-direction:column;align-items:center;
justify-content:center;padding:24px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;
padding:40px;width:100%;max-width:480px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;
color:var(--text);text-decoration:none;display:flex;align-items:center;
gap:10px;margin-bottom:32px;}
.logo-icon{width:32px;height:32px;border-radius:8px;
background:linear-gradient(135deg,var(--accent),var(--accent2));
display:flex;align-items:center;justify-content:center;font-size:16px;}
h2{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;
margin-bottom:8px;letter-spacing:-0.5px;}
.sub{color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.5;}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;
margin-top:16px;color:var(--text);}
input,select,textarea{width:100%;padding:10px 14px;border-radius:8px;
border:1px solid var(--border);background:var(--bg3);color:var(--text);
font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:.2s;}
input:focus,select:focus{border-color:var(--accent);}
.btn{display:block;width:100%;padding:13px;margin-top:24px;border:none;
border-radius:8px;background:var(--accent);color:#080a0f;font-family:'DM Sans',sans-serif;
font-size:15px;font-weight:500;cursor:pointer;transition:.2s;}
.btn:hover{opacity:.85;}
.btn-o{background:transparent;color:var(--text);border:1px solid var(--border);
margin-top:12px;}
.btn-o:hover{border-color:rgba(255,255,255,.25);}
.err{color:var(--err);font-size:13px;margin-top:4px;}
.link{color:var(--accent);text-decoration:none;}
.hint{font-size:12px;color:var(--muted);margin-top:4px;}
.check-row{display:flex;gap:10px;align-items:flex-start;margin-top:16px;}
.check-row input{width:18px;flex-shrink:0;margin-top:2px;}
.check-row label{margin:0;font-size:13px;color:var(--muted);}
.divider{border:none;border-top:1px solid var(--border);margin:24px 0;}
.pkg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px;}
.pkg{border:1px solid var(--border);border-radius:10px;padding:14px 10px;
cursor:pointer;transition:.2s;text-align:center;}
.pkg:hover{border-color:var(--accent);}
.pkg.selected{border-color:var(--accent);background:rgba(0,212,170,.06);}
.pkg-name{font-weight:600;font-size:14px;margin-bottom:4px;}
.pkg-price{color:var(--accent);font-size:13px;}
.pkg-desc{color:var(--muted);font-size:11px;margin-top:4px;}
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
