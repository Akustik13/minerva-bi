{% extends "admin/base_site.html" %}
{% load i18n %}

{% block title %}Пароль змінено{% endblock %}

{% block content %}
<div style="max-width:420px;margin:60px auto;background:var(--bg-card,#161b22);
            border:1px solid var(--border-strong,#2a3f52);border-radius:10px;padding:32px 36px;
            text-align:center;">
  <div style="font-size:48px;margin-bottom:16px;">✅</div>
  <h1 style="font-size:18px;font-weight:700;color:var(--ok,#3fb950);margin:0 0 12px;">
    Пароль змінено!
  </h1>
  <p style="font-size:13px;color:var(--text-muted,#9aafbe);margin:0 0 24px;">
    Тепер можете увійти з новим паролем.
  </p>
  <a href="/admin/login/"
     style="display:inline-block;padding:10px 28px;background:var(--accent,#58a6ff);
            border-radius:6px;color:#fff;font-size:14px;font-weight:600;text-decoration:none;">
    Увійти
  </a>
</div>
{% endblock %}
