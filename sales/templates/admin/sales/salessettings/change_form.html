{% extends "admin/change_form.html" %}
{% load static %}

{% block extrahead %}{{ block.super }}
<style>
#ls-folder-ui {
  margin-top: 8px;
  padding: 14px 16px;
  background: #0d1520;
  border: 1px solid #2a3f52;
  border-radius: 8px;
  font-size: 13px;
  max-width: 560px;
}
#ls-folder-name {
  font-family: monospace;
  color: #c9d8e4;
  font-weight: 600;
  font-size: 14px;
  word-break: break-all;
}
#ls-status { font-size: 12px; margin-top: 4px; }
.ls-btn {
  background: #37474f;
  color: #b0bec5;
  border: 1px solid #546e7a;
  padding: 6px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  margin-right: 8px;
  margin-top: 10px;
}
.ls-btn:hover { background: #455a64; color: #c9d8e4; }
.ls-btn.primary { background: #1565c0; border-color: #1976d2; color: #fff; }
.ls-btn.primary:hover { background: #1976d2; }
.ls-btn.danger  { background: #b71c1c; border-color: #c62828; color: #fff; }
.ls-btn.danger:hover { background: #c62828; }
#ls-no-support {
  padding: 10px 14px;
  background: rgba(230,81,0,.12);
  border: 1px solid rgba(230,81,0,.35);
  border-radius: 6px;
  color: #ffb74d;
  font-size: 13px;
  max-width: 560px;
  margin-top: 8px;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {

  /* Знаходимо поле local_docs_path — ховаємо його (замінюємо своїм UI) */
  var pathRow = (function () {
    var inp = document.getElementById('id_local_docs_path');
    if (!inp) return null;
    var row = inp.closest('.form-row, .field-local_docs_path') || inp.parentElement;
    return { inp: inp, row: row };
  })();

  if (pathRow) {
    /* Ховаємо стандартне поле — воно зберігає значення але не видно */
    pathRow.row.style.display = 'none';
  }

  /* Перевіряємо підтримку */
  if (!window.MinervaLocalSave || !window.MinervaLocalSave.supported) {
    var noSupport = document.createElement('div');
    noSupport.id = 'ls-no-support';
    noSupport.innerHTML =
      '⚠️ Ваш браузер не підтримує File System Access API.<br>'
      + 'Для локального збереження використовуйте <b>Chrome</b> або <b>Edge</b> (версія 86+).';
    if (pathRow) pathRow.row.insertAdjacentElement('afterend', noSupport);
    return;
  }

  var LS = window.MinervaLocalSave;

  /* ── Будуємо UI ───────────────────────────────────────────────────────── */
  var ui = document.createElement('div');
  ui.id = 'ls-folder-ui';
  ui.innerHTML =
    '<div style="color:#7ab3cc;font-weight:700;margin-bottom:10px">📂 Локальна папка для збереження</div>'
    + '<div id="ls-folder-name">—</div>'
    + '<div id="ls-status" style="color:#607d8b">Перевірка...</div>'
    + '<div style="margin-top:10px">'
    +   '<button type="button" class="ls-btn primary" id="ls-pick-btn">📂 Обрати папку</button>'
    +   '<button type="button" class="ls-btn danger"  id="ls-forget-btn" style="display:none">🗑️ Забути папку</button>'
    + '</div>'
    + '<div style="margin-top:10px;font-size:11px;color:#455a64;line-height:1.6">'
    +   'ℹ️ Папка обирається один раз і запам\'ятовується в браузері (IndexedDB).<br>'
    +   'Файли зберігаються браузером напряму на ваш ПК — сервер не потрібен.'
    + '</div>';

  if (pathRow) {
    pathRow.row.insertAdjacentElement('afterend', ui);
  }

  var nameEl    = document.getElementById('ls-folder-name');
  var statusEl  = document.getElementById('ls-status');
  var pickBtn   = document.getElementById('ls-pick-btn');
  var forgetBtn = document.getElementById('ls-forget-btn');

  /* ── Оновити відображення ─────────────────────────────────────────────── */
  function setReady(folderName) {
    nameEl.textContent   = '📁 ' + folderName;
    statusEl.innerHTML   = '<span style="color:#4caf50">✅ Доступ є — файли зберігатимуться сюди</span>';
    pickBtn.textContent  = '🔄 Змінити папку';
    forgetBtn.style.display = 'inline-block';
    /* Зберігаємо назву папки у прихованому полі (для відображення в upload_widget) */
    if (pathRow) pathRow.inp.value = folderName;
  }

  function setEmpty() {
    nameEl.textContent   = '—';
    statusEl.innerHTML   = '<span style="color:#607d8b">Папку не обрано</span>';
    pickBtn.textContent  = '📂 Обрати папку';
    forgetBtn.style.display = 'none';
    if (pathRow) pathRow.inp.value = '';
  }

  function setError(msg) {
    statusEl.innerHTML = '<span style="color:#ef9a9a">⚠️ ' + msg + '</span>';
  }

  /* ── Ініціалізація: перевірити збережений handle ──────────────────────── */
  LS.getHandle().then(function (handle) {
    if (handle) {
      setReady(handle.name);
    } else {
      setEmpty();
    }
  }).catch(function () {
    setEmpty();
  });

  /* ── Обрати папку ─────────────────────────────────────────────────────── */
  pickBtn.addEventListener('click', function () {
    pickBtn.disabled = true;
    pickBtn.textContent = '⏳ Відкриття...';
    LS.pickFolder().then(function (handle) {
      pickBtn.disabled = false;
      if (handle) {
        setReady(handle.name);
      } else {
        /* Користувач скасував picker */
        setEmpty();
        pickBtn.textContent = '📂 Обрати папку';
      }
    }).catch(function (e) {
      pickBtn.disabled = false;
      setError('Помилка: ' + (e.message || String(e)));
      pickBtn.textContent = '📂 Обрати папку';
    });
  });

  /* ── Забути папку ─────────────────────────────────────────────────────── */
  forgetBtn.addEventListener('click', function () {
    if (!confirm('Забути збережену папку?')) return;
    LS.forgetFolder().then(function () {
      setEmpty();
    });
  });

});
</script>
{% endblock %}
