{% extends "admin/change_form.html" %}

{% block extrahead %}{{ block.super }}
<style>
#lpBrowseBtn {
  background: #37474f;
  color: #b0bec5;
  border: 1px solid #546e7a;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  margin-left: 6px;
  vertical-align: middle;
}
#lpBrowseBtn:hover { background: #455a64; color: #c9d8e4; }
#lpPathResult {
  display: none;
  margin-top: 6px;
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 12px;
  font-family: monospace;
  line-height: 1.6;
  word-break: break-all;
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var inp = document.getElementById('id_local_docs_path');
  if (!inp) return;

  inp.style.fontFamily = 'monospace';
  inp.style.width = '60%';

  var CHECK_URL = '{% url "admin:sales_salesorder_check_local_path" %}';

  /* ── Кнопка «Перевірити шлях» ──────────────────────────────────────── */
  var btn = document.createElement('button');
  btn.type = 'button';
  btn.id   = 'lpBrowseBtn';
  btn.title = 'Перевірити чи існує шлях на сервері';
  btn.textContent = '🔍 Перевірити';
  inp.insertAdjacentElement('afterend', btn);

  /* ── Результат перевірки ────────────────────────────────────────────── */
  var result = document.createElement('div');
  result.id = 'lpPathResult';
  btn.insertAdjacentElement('afterend', result);

  btn.addEventListener('click', function () {
    var p = inp.value.trim();
    if (!p) { alert('Введіть шлях'); return; }
    btn.disabled = true;
    btn.textContent = '⏳';
    fetch(CHECK_URL + '?path=' + encodeURIComponent(p))
      .then(function (r) { return r.json(); })
      .then(function (d) {
        btn.disabled = false;
        btn.textContent = '🔍 Перевірити';
        result.style.display = 'block';
        if (d.error) {
          result.style.background = 'rgba(183,28,28,.15)';
          result.style.border = '1px solid rgba(183,28,28,.4)';
          result.style.color = '#ef9a9a';
          result.innerHTML = '❌ ' + d.error;
          return;
        }
        if (d.windows_on_linux) {
          result.style.background = 'rgba(183,28,28,.15)';
          result.style.border = '1px solid rgba(183,28,28,.4)';
          result.style.color = '#ef9a9a';
          result.innerHTML = '🖥️❌ Це Windows-шлях, але сервер працює на <b>Linux/Docker</b>.<br>'
            + '<span style="color:#9aafbe">Сервер фізично не може записувати на <code>' + d.path + '</code></span><br><br>'
            + '<b style="color:#ffb74d">Варіанти:</b><br>'
            + '1️⃣ Запусти Django локально на Windows → шлях C:\\ запрацює<br>'
            + '2️⃣ Вкажи Linux-шлях до папки NAS, напр.: <code style="color:#81c784">/volume1/homes/prymv/Documents/Orders</code>';
          return;
        }
        if (d.exists && d.writable) {
          result.style.background = 'rgba(46,125,50,.15)';
          result.style.border = '1px solid rgba(46,125,50,.4)';
          result.style.color = '#81c784';
          result.innerHTML = '✅ Шлях існує і доступний для запису<br>'
            + '<span style="color:#607d8b">Сервер: ' + d.platform + ' → ' + d.normalized + '</span>';
        } else if (d.exists && !d.writable) {
          result.style.background = 'rgba(230,81,0,.12)';
          result.style.border = '1px solid rgba(230,81,0,.4)';
          result.style.color = '#ffb74d';
          result.innerHTML = '⚠️ Папка існує, але немає прав на запис<br>'
            + '<span style="color:#607d8b">Сервер: ' + d.platform + ' → ' + d.normalized + '</span>';
        } else {
          result.style.background = 'rgba(183,28,28,.15)';
          result.style.border = '1px solid rgba(183,28,28,.4)';
          result.style.color = '#ef9a9a';
          result.innerHTML = '❌ Шлях не знайдено на сервері (' + d.platform + ')<br>'
            + '<span style="color:#607d8b">Перевірено: ' + d.normalized + '</span><br>'
            + (d.platform !== 'win32'
              ? '<span style="color:#546e7a">Сервер — Linux/Docker. Вкажіть шлях до примонтованого тому NAS, напр.: <code>/volume1/homes/prymv/Documents</code></span>'
              : '<span style="color:#546e7a">Перевірте правильність шляху</span>');
        }
      })
      .catch(function () {
        btn.disabled = false;
        btn.textContent = '🔍 Перевірити';
        result.style.display = 'block';
        result.style.color = '#ef9a9a';
        result.innerHTML = '❌ Помилка мережі';
      });
  });
});
</script>
{% endblock %}
