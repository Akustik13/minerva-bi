{% extends "admin/change_form.html" %}
{% load i18n %}

{% block extrahead %}
{{ block.super }}
<script>
(function () {
  var MODULE_PK_MAP    = {{ mv_module_pk_map|safe }};
  var ROLE_MODULES     = {{ mv_role_modules|safe }};
  var BUNDLE_MODULES   = {{ mv_bundle_modules|safe }};
  var APP_MODELS       = {{ mv_app_models_json|default:"{}"|safe }};
  var MODULE_NAMES     = {{ mv_module_names|default:"{}"|safe }};
  var ROLE_OPERATIONS  = {{ mv_role_operations|default:"{}"|safe }};
  var ALL_OPS          = {{ mv_all_ops|default:"[]"|safe }};
  var OP_LABELS        = {{ mv_op_labels|default:"{}"|safe }};
  var ROLE_CAN         = {{ mv_role_can|default:"{}"|safe }};
  /* modules always accessible regardless of allow-list (mirrors Python ALWAYS set) */
  var ALWAYS_MODULES   = ['core', 'auth', 'faq', 'admin', 'authtoken', 'dashboard'];

  /* ── Module checkboxes sync ────────────────────────────────────────────── */
  function toPks(appLabels) {
    if (appLabels === '__all__') return '__all__';
    return appLabels.map(function (l) { return MODULE_PK_MAP[l]; }).filter(Boolean);
  }

  function setCheckboxes(pks) {
    document.querySelectorAll('input[name="modules_override"]').forEach(function (cb) {
      cb.checked = (pks === '__all__') ? true : pks.indexOf(cb.value) !== -1;
    });
  }

  function syncFromForm() {
    var bundleSel = document.querySelector('select[name="bundle"]');
    var roleSel   = document.querySelector('select[name="role"]');
    var bundleVal = bundleSel ? bundleSel.value : '';
    if (bundleVal && BUNDLE_MODULES[bundleVal]) {
      setCheckboxes(toPks(BUNDLE_MODULES[bundleVal]));
    } else if (roleSel) {
      setCheckboxes(toPks(ROLE_MODULES[roleSel.value] || []));
    }
    buildConflicts();
  }

  /* ── Denied models panel ───────────────────────────────────────────────── */
  function getDeniedInput() {
    return document.querySelector('input[name="denied_models"]');
  }

  function getDenied() {
    var inp = getDeniedInput();
    if (!inp || !inp.value) return [];
    try { return JSON.parse(inp.value) || []; } catch (e) { return []; }
  }

  function setDenied(arr) {
    var inp = getDeniedInput();
    if (inp) inp.value = JSON.stringify(arr || []);
  }

  window.mvToggleDeniedSec = function (al) {
    var sec   = document.getElementById('mv-denied-sec-' + al);
    var arrow = document.getElementById('mv-denied-arr-' + al);
    if (!sec) return;
    var open = sec.style.display !== 'none';
    sec.style.display = open ? 'none' : 'block';
    if (arrow) arrow.textContent = open ? '▶' : '▼';
  };

  window.mvDeniedChange = function (key, cb) {
    var safeKey = key.replace(':', '-');
    var icon  = document.getElementById('mv-di-' + safeKey);
    var label = document.getElementById('mv-dl-' + safeKey);
    if (icon)  icon.style.display = cb.checked ? 'inline' : 'none';
    if (label) label.style.color  = cb.checked ? 'var(--err,#f85149)' : '';
    /* rebuild denied set */
    var current = getDenied();
    var set = {};
    current.forEach(function (k) { set[k] = true; });
    if (cb.checked) set[key] = true;
    else delete set[key];
    setDenied(Object.keys(set));
    /* update count badge */
    var al    = key.split(':')[0];
    var badge = document.getElementById('mv-denied-badge-' + al);
    if (badge) {
      var sec = document.getElementById('mv-denied-sec-' + al);
      var n   = sec ? sec.querySelectorAll('input[type="checkbox"]:checked').length : 0;
      badge.textContent = n + '\u00a0забор.';
      badge.style.display = n ? 'inline' : 'none';
    }
    buildConflicts();
  };

  function buildDeniedPanel() {
    var panel = document.getElementById('mv-denied-panel');
    if (!panel) return;

    var denied    = getDenied();
    var deniedSet = {};
    denied.forEach(function (k) { deniedSet[k] = true; });

    /* show only apps registered in ModuleRegistry */
    var apps = Object.keys(APP_MODELS).filter(function (al) {
      return MODULE_PK_MAP[al] !== undefined && APP_MODELS[al] && APP_MODELS[al].length;
    });
    apps.sort(function (a, b) {
      return (MODULE_NAMES[a] || a).localeCompare(MODULE_NAMES[b] || b);
    });

    if (!apps.length) {
      panel.innerHTML = '<em style="color:var(--text-dim);font-size:12px">Немає зареєстрованих модулів</em>';
      return;
    }

    var grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-top:4px';

    apps.forEach(function (al) {
      var models = APP_MODELS[al] || [];
      if (!models.length) return;
      var appName     = MODULE_NAMES[al] || al;
      var deniedCount = models.filter(function (m) { return deniedSet[al + ':' + m.object_name]; }).length;

      var card = document.createElement('div');
      card.style.cssText = 'border:1px solid var(--border-strong);border-radius:6px;overflow:hidden';

      /* header */
      var hdr = document.createElement('div');
      hdr.style.cssText = 'padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:7px;'
        + 'background:var(--bg-hover);user-select:none;font-size:12px';
      (function (capturedAl) { hdr.onclick = function () { mvToggleDeniedSec(capturedAl); }; })(al);

      var arrow = document.createElement('span');
      arrow.id = 'mv-denied-arr-' + al;
      arrow.textContent = '▶';
      arrow.style.cssText = 'font-size:9px;color:var(--text-dim);flex-shrink:0';

      var nameSpan = document.createElement('span');
      nameSpan.style.fontWeight = '600';
      nameSpan.textContent = appName;

      var countSpan = document.createElement('span');
      countSpan.style.cssText = 'font-size:10px;color:var(--text-dim);margin-left:auto;flex-shrink:0;padding-left:4px';
      countSpan.textContent = models.length + '\u00a0мод.';

      var badge = document.createElement('span');
      badge.id = 'mv-denied-badge-' + al;
      badge.style.cssText = 'background:#f85149;color:#fff;border-radius:10px;padding:1px 6px;'
        + 'font-size:10px;flex-shrink:0;margin-left:4px;display:' + (deniedCount > 0 ? 'inline' : 'none');
      badge.textContent = deniedCount + '\u00a0забор.';

      hdr.appendChild(arrow);
      hdr.appendChild(nameSpan);
      hdr.appendChild(countSpan);
      hdr.appendChild(badge);

      /* body */
      var body = document.createElement('div');
      body.id = 'mv-denied-sec-' + al;
      body.style.cssText = 'display:none;padding:6px 10px 8px';

      models.forEach(function (m) {
        var key     = al + ':' + m.object_name;
        var safeKey = key.replace(':', '-');
        var isDenied = !!deniedSet[key];

        var lbl = document.createElement('label');
        lbl.style.cssText = 'display:flex;align-items:center;gap:7px;padding:3px 0;cursor:pointer;font-size:12px';

        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = isDenied;
        cb.style.cssText = 'width:14px;height:14px;cursor:pointer;flex-shrink:0;margin:0';
        cb.setAttribute('data-denied-key', key);
        (function (capturedKey) { cb.onchange = function () { mvDeniedChange(capturedKey, this); }; })(key);

        var icon = document.createElement('span');
        icon.id = 'mv-di-' + safeKey;
        icon.textContent = '🚫';
        icon.style.cssText = 'flex-shrink:0;font-size:11px;display:' + (isDenied ? 'inline' : 'none');

        var nameEl = document.createElement('span');
        nameEl.id = 'mv-dl-' + safeKey;
        nameEl.style.color = isDenied ? 'var(--err,#f85149)' : '';
        nameEl.textContent = m.verbose_name;

        lbl.appendChild(cb);
        lbl.appendChild(icon);
        lbl.appendChild(nameEl);
        body.appendChild(lbl);
      });

      card.appendChild(hdr);
      card.appendChild(body);
      grid.appendChild(card);
    });

    panel.innerHTML = '';
    panel.appendChild(grid);
  }

  /* ── Operations panel ──────────────────────────────────────────────────── */
  function getOpsInput() {
    return document.querySelector('input[name="module_operations"]');
  }

  function getOps() {
    var inp = getOpsInput();
    if (!inp || !inp.value || inp.value === 'null') return null;
    try { return JSON.parse(inp.value); } catch (e) { return null; }
  }

  function setOps(obj) {
    var inp = getOpsInput();
    if (!inp) return;
    inp.value = (obj === null || obj === undefined) ? 'null' : JSON.stringify(obj);
  }

  function syncOpsFromCheckboxes() {
    var toggle = document.getElementById('mv-ops-override-toggle');
    if (!toggle || !toggle.checked) return;
    var ops = {};
    document.querySelectorAll('input[data-ops-app]').forEach(function (cb) {
      var al = cb.getAttribute('data-ops-app');
      var op = cb.getAttribute('data-ops-op');
      if (!ops[al]) ops[al] = [];
      if (cb.checked) ops[al].push(op);
    });
    setOps(ops);
  }

  function buildOpsPanel() {
    var panel = document.getElementById('mv-ops-panel');
    if (!panel) return;

    var roleSel  = document.querySelector('select[name="role"]');
    var role     = roleSel ? roleSel.value : '';
    var roleOps  = ROLE_OPERATIONS[role] || {};

    /* modules registered in ModuleRegistry, sorted by name */
    var apps = Object.keys(MODULE_NAMES).filter(function (al) {
      return MODULE_PK_MAP[al] !== undefined;
    });
    apps.sort(function (a, b) {
      return (MODULE_NAMES[a] || a).localeCompare(MODULE_NAMES[b] || b);
    });

    if (!apps.length) {
      panel.innerHTML = '<em style="color:var(--text-dim);font-size:12px">Немає зареєстрованих модулів</em>';
      return;
    }

    var current    = getOps();       /* null = auto; {} = explicit */
    var isOverride = current !== null;

    /* ── Toggle row ── */
    var wrap = document.createElement('div');

    var toggleRow = document.createElement('div');
    toggleRow.style.cssText = 'margin-bottom:10px;padding:8px 12px;background:var(--bg-hover);'
      + 'border-radius:6px;border:1px solid var(--border-strong)';

    var toggleLbl = document.createElement('label');
    toggleLbl.style.cssText = 'display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;font-weight:600';

    var toggleCb = document.createElement('input');
    toggleCb.type = 'checkbox';
    toggleCb.id   = 'mv-ops-override-toggle';
    toggleCb.checked = isOverride;
    toggleCb.style.cssText = 'width:15px;height:15px;cursor:pointer;flex-shrink:0;margin:0';

    var toggleText = document.createElement('span');
    toggleText.textContent = 'Ручне перевизначення операцій';

    var toggleHint = document.createElement('span');
    toggleHint.style.cssText = 'font-size:10px;color:var(--text-dim);font-weight:400;margin-left:4px';
    toggleHint.textContent = isOverride ? '(активно)' : '(None = авто за роллю)';

    toggleLbl.appendChild(toggleCb);
    toggleLbl.appendChild(toggleText);
    toggleLbl.appendChild(toggleHint);
    toggleRow.appendChild(toggleLbl);
    wrap.appendChild(toggleRow);

    /* ── Grid of modules ── */
    var grid = document.createElement('div');
    grid.id = 'mv-ops-grid';
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:8px;'
      + (isOverride ? '' : 'opacity:0.4;pointer-events:none');

    /* helper: sync select-all checkbox state for a module */
    function updateModuleSelAll(selAllCb, opCbs) {
      var total   = opCbs.length;
      var checked = Array.from(opCbs).filter(function (c) { return c.checked; }).length;
      if (checked === 0) {
        selAllCb.checked = false; selAllCb.indeterminate = false;
      } else if (checked === total) {
        selAllCb.checked = true;  selAllCb.indeterminate = false;
      } else {
        selAllCb.checked = false; selAllCb.indeterminate = true;
      }
    }

    apps.forEach(function (al) {
      var appName     = MODULE_NAMES[al] || al;
      var roleAppOps  = (roleOps === '__all__') ? ALL_OPS.slice() : (roleOps[al] || []);
      var currentOps  = isOverride ? ((current || {})[al] || []) : roleAppOps;

      var card = document.createElement('div');
      card.style.cssText = 'border:1px solid var(--border-strong);border-radius:6px;overflow:hidden';

      /* header */
      var hdr = document.createElement('div');
      hdr.style.cssText = 'padding:6px 10px;background:var(--bg-hover);'
        + 'display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600';

      var nameSpan = document.createElement('span');
      nameSpan.textContent = appName;

      /* right side: select-all + role badge */
      var hdrRight = document.createElement('div');
      hdrRight.style.cssText = 'display:flex;align-items:center;gap:8px';

      /* "Вибрати все" checkbox */
      var selAllLbl = document.createElement('label');
      selAllLbl.style.cssText = 'display:inline-flex;align-items:center;gap:3px;cursor:pointer;'
        + 'font-size:10px;font-weight:400;color:var(--text-muted);user-select:none;'
        + 'padding:1px 5px;border-radius:3px;border:1px solid var(--border-strong);'
        + 'background:var(--bg-card)';
      selAllLbl.title = 'Вибрати / зняти всі операції для цього модуля';

      var selAllCb = document.createElement('input');
      selAllCb.type = 'checkbox';
      selAllCb.style.cssText = 'width:11px;height:11px;cursor:pointer;flex-shrink:0;margin:0;accent-color:var(--link-fg,#58a6ff)';

      var selAllText = document.createElement('span');
      selAllText.textContent = 'Всі';

      selAllLbl.appendChild(selAllCb);
      selAllLbl.appendChild(selAllText);

      var defBadge = document.createElement('span');
      defBadge.style.cssText = 'font-size:10px;font-weight:400;color:var(--text-dim)';
      defBadge.textContent = roleAppOps === '__all__' ? 'роль: всі'
        : 'роль: ' + (roleAppOps.length ? roleAppOps.join(', ') : 'немає');

      hdrRight.appendChild(selAllLbl);
      hdrRight.appendChild(defBadge);
      hdr.appendChild(nameSpan);
      hdr.appendChild(hdrRight);

      /* ops row */
      var body = document.createElement('div');
      body.style.cssText = 'padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px';

      ALL_OPS.forEach(function (op) {
        var isChecked = (currentOps.indexOf(op) !== -1);
        var isRoleDefault = (roleAppOps === '__all__' || roleAppOps.indexOf(op) !== -1);

        var lbl = document.createElement('label');
        lbl.style.cssText = 'display:inline-flex;align-items:center;gap:4px;cursor:pointer;'
          + 'padding:3px 8px;border-radius:4px;font-size:11px;user-select:none;'
          + 'border:1px solid ' + (isChecked ? 'var(--accent,#58a6ff)' : 'var(--border-strong)')
          + ';background:' + (isChecked ? 'rgba(88,166,255,.12)' : 'var(--bg-card)');

        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = isChecked;
        cb.setAttribute('data-ops-app', al);
        cb.setAttribute('data-ops-op', op);
        cb.style.cssText = 'width:13px;height:13px;cursor:pointer;flex-shrink:0;margin:0';

        var opText = document.createElement('span');
        opText.textContent = OP_LABELS[op] || op;
        if (isRoleDefault) {
          opText.title = 'Дефолт ролі';
          opText.style.textDecoration = 'underline dotted';
        }

        cb.addEventListener('change', function () {
          lbl.style.borderColor = this.checked ? 'var(--accent,#58a6ff)' : 'var(--border-strong)';
          lbl.style.background  = this.checked ? 'rgba(88,166,255,.12)' : 'var(--bg-card)';
          updateModuleSelAll(selAllCb, body.querySelectorAll('input[data-ops-op]'));
          syncOpsFromCheckboxes();
        });

        lbl.appendChild(cb);
        lbl.appendChild(opText);
        body.appendChild(lbl);
      });

      /* wire select-all after body is populated */
      var opCbs = body.querySelectorAll('input[data-ops-op]');
      updateModuleSelAll(selAllCb, opCbs);   // set initial state

      selAllCb.addEventListener('change', function () {
        var newVal = this.checked;
        this.indeterminate = false;
        opCbs.forEach(function (opCb) {
          if (opCb.checked !== newVal) {
            opCb.checked = newVal;
            var opLbl = opCb.parentElement;
            if (opLbl) {
              opLbl.style.borderColor = newVal ? 'var(--accent,#58a6ff)' : 'var(--border-strong)';
              opLbl.style.background  = newVal ? 'rgba(88,166,255,.12)' : 'var(--bg-card)';
            }
          }
        });
        syncOpsFromCheckboxes();
      });

      card.appendChild(hdr);
      card.appendChild(body);
      grid.appendChild(card);
    });

    wrap.appendChild(grid);
    panel.innerHTML = '';
    panel.appendChild(wrap);

    /* bind toggle */
    document.getElementById('mv-ops-override-toggle').addEventListener('change', function () {
      var gridEl   = document.getElementById('mv-ops-grid');
      var hintEl   = toggleHint;
      if (this.checked) {
        gridEl.style.opacity       = '1';
        gridEl.style.pointerEvents = '';
        hintEl.textContent = '(активно)';
        /* initialize from role defaults */
        var initial = {};
        apps.forEach(function (al) {
          var rOps = (roleOps === '__all__') ? ALL_OPS.slice() : (roleOps[al] || []);
          initial[al] = rOps.slice();
        });
        setOps(initial);
        /* sync checkboxes to match initial */
        document.querySelectorAll('input[data-ops-app]').forEach(function (cb) {
          var ial  = cb.getAttribute('data-ops-app');
          var iop  = cb.getAttribute('data-ops-op');
          var rOps = (roleOps === '__all__') ? ALL_OPS : (roleOps[ial] || []);
          cb.checked = rOps.indexOf(iop) !== -1;
          var lbl = cb.parentElement;
          if (lbl) {
            lbl.style.borderColor = cb.checked ? 'var(--accent,#58a6ff)' : 'var(--border-strong)';
            lbl.style.background  = cb.checked ? 'rgba(88,166,255,.12)' : 'var(--bg-card)';
          }
        });
      } else {
        gridEl.style.opacity       = '0.4';
        gridEl.style.pointerEvents = 'none';
        hintEl.textContent = '(None = авто за роллю)';
        setOps(null);
      }
    });

    /* rebuild panel when role changes */
    var roleSel2 = document.querySelector('select[name="role"]');
    if (roleSel2) {
      roleSel2.addEventListener('change', function () {
        /* only rebuild if not in override mode */
        var tog = document.getElementById('mv-ops-override-toggle');
        if (!tog || !tog.checked) buildOpsPanel();
      });
    }
  }

  /* ── Conflicts panel ───────────────────────────────────────────────────── */
  function getCanEffective(fieldName, role) {
    /* NullBooleanSelect renders as <select> with values 'unknown'/'true'/'false' */
    var sel = document.querySelector('select[name="' + fieldName + '"]');
    if (sel) {
      if (sel.value === 'true')  return true;
      if (sel.value === 'false') return false;
    }
    /* null/unknown → fall back to role default */
    var rc = ROLE_CAN[role] || {};
    return !!rc[fieldName.replace('can_', '')];
  }

  function getEffectiveMods() {
    /* mirrors UserProfile.get_allowed_modules() priority */
    var overrideCbs = document.querySelectorAll('input[name="modules_override"]');
    var checkedPks  = [];
    overrideCbs.forEach(function (cb) { if (cb.checked) checkedPks.push(cb.value); });
    if (checkedPks.length) {
      var apps = [];
      Object.keys(MODULE_PK_MAP).forEach(function (al) {
        if (checkedPks.indexOf(MODULE_PK_MAP[al]) !== -1) apps.push(al);
      });
      return apps;
    }
    var bundleSel = document.querySelector('select[name="bundle"]');
    if (bundleSel && bundleSel.value && BUNDLE_MODULES[bundleSel.value]) {
      return BUNDLE_MODULES[bundleSel.value];
    }
    var roleSel = document.querySelector('select[name="role"]');
    var role = roleSel ? roleSel.value : '';
    return ROLE_MODULES[role] || [];
  }

  function buildConflicts() {
    var roleSel  = document.querySelector('select[name="role"]');
    var role     = roleSel ? roleSel.value : '';
    var denied   = getDenied();
    var effMods  = getEffectiveMods();
    var isAll    = (effMods === '__all__');

    var errors = [];
    var infos  = [];

    /* 1. can_view_audit but AuditLog denied */
    if (getCanEffective('can_view_audit', role) && denied.indexOf('core:AuditLog') !== -1) {
      errors.push('Журнал аудиту увімкнено (<code>can_view_audit</code>), але <code>core:AuditLog</code> заблоковано — сторінка журналу буде недоступна.');
    }

    /* 2. can_manage_users but UserProfile / User denied */
    if (getCanEffective('can_manage_users', role)) {
      if (denied.indexOf('core:UserProfile') !== -1) {
        errors.push('Управління юзерами увімкнено (<code>can_manage_users</code>), але <code>core:UserProfile</code> заблоковано.');
      }
      if (denied.indexOf('auth:User') !== -1) {
        errors.push('Управління юзерами увімкнено (<code>can_manage_users</code>), але <code>auth:User</code> заблоковано.');
      }
    }

    /* 3. Module allowed but ALL its models are denied */
    var allowedApps = isAll ? Object.keys(MODULE_PK_MAP) : effMods;
    if (Array.isArray(allowedApps)) {
      allowedApps.forEach(function (al) {
        var models = APP_MODELS[al] || [];
        if (!models.length) return;
        var allDenied = models.every(function (m) {
          return denied.indexOf(al + ':' + m.object_name) !== -1;
        });
        if (allDenied) {
          errors.push('Модуль <b>' + (MODULE_NAMES[al] || al) + '</b> дозволено, але всі підрозділи заблоковано — фактичний доступ відсутній.');
        }
      });
    }

    /* 4. Model denied but its module is not in allowed list (redundant rule) */
    denied.forEach(function (entry) {
      var al = entry.split(':')[0];
      if (ALWAYS_MODULES.indexOf(al) !== -1) return; /* always-on modules: denying is valid */
      var inAllowed = isAll || (Array.isArray(effMods) && effMods.indexOf(al) !== -1);
      if (!inAllowed) {
        infos.push('<code>' + entry + '</code> — модуль <b>' + (MODULE_NAMES[al] || al) + '</b> вже відключено, заборона підрозділу надлишкова.');
      }
    });

    /* Render */
    var existing = document.getElementById('mv-conflicts-panel');
    if (existing) existing.remove();
    if (!errors.length && !infos.length) return;

    var panel = document.createElement('div');
    panel.id = 'mv-conflicts-panel';
    panel.style.cssText = 'margin:0 0 16px;border-radius:8px;overflow:hidden;border:1px solid var(--border-strong)';

    function makeSection(items, bgHdr, colorHdr, bgBody, leftBorder, title) {
      var hdr = document.createElement('div');
      hdr.style.cssText = 'padding:8px 14px;background:' + bgHdr + ';color:' + colorHdr
        + ';font-size:12px;font-weight:700';
      hdr.innerHTML = title + ' (' + items.length + ')';
      panel.appendChild(hdr);
      var body = document.createElement('div');
      body.style.cssText = 'padding:8px 14px;background:' + bgBody
        + ';display:flex;flex-direction:column;gap:5px';
      items.forEach(function (msg) {
        var row = document.createElement('div');
        row.style.cssText = 'font-size:12px;color:' + colorHdr
          + ';line-height:1.5;padding:5px 8px;background:rgba(0,0,0,.15)'
          + ';border-radius:4px;border-left:3px solid ' + leftBorder;
        row.innerHTML = msg;
        body.appendChild(row);
      });
      panel.appendChild(body);
    }

    if (errors.length) {
      makeSection(errors, '#7c3d0c', '#ffd0a0', '#3d2008', '#f97316', '⚠️ Суперечності в налаштуваннях');
    }
    if (infos.length) {
      makeSection(infos,
        'var(--bg-hover)', 'var(--text-dim)', 'var(--bg-input)',
        'var(--border-strong)', 'ℹ️ Надлишкові правила');
    }

    /* insert before first fieldset in #content-main */
    var cm    = document.getElementById('content-main');
    var first = cm ? cm.querySelector('.module') : null;
    if (first) first.parentNode.insertBefore(panel, first);
    else if (cm) cm.insertBefore(panel, cm.firstChild);
  }

  /* ── Init ──────────────────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function () {
    var bundleSel = document.querySelector('select[name="bundle"]');
    var roleSel   = document.querySelector('select[name="role"]');

    if (bundleSel) bundleSel.addEventListener('change', syncFromForm);
    if (roleSel)   roleSel.addEventListener('change', syncFromForm);

    /* Cancel button */
    var submitRow = document.querySelector('.submit-row');
    if (submitRow) {
      var btn = document.createElement('a');
      btn.href = '{{ mv_changelist_url }}';
      btn.textContent = 'Скасувати';
      btn.style.cssText = 'float:left;margin:5px 0 0 0;padding:8px 16px;'
        + 'background:transparent;border:1px solid var(--border-strong,#2a3f52);'
        + 'border-radius:4px;color:var(--text-muted,#9aafbe);'
        + 'text-decoration:none;font-size:13px;cursor:pointer;';
      btn.onmouseenter = function () {
        btn.style.color = 'var(--text,#e6edf3)';
        btn.style.borderColor = 'var(--text-muted,#9aafbe)';
      };
      btn.onmouseleave = function () {
        btn.style.color = 'var(--text-muted,#9aafbe)';
        btn.style.borderColor = 'var(--border-strong,#2a3f52)';
      };
      submitRow.appendChild(btn);
    }

    /* Build panels */
    buildDeniedPanel();
    buildOpsPanel();
    buildConflicts();

    /* Re-run conflicts on any relevant change */
    ['can_delete','can_export','can_import','can_view_audit','can_manage_users'].forEach(function (f) {
      var sel = document.querySelector('select[name="' + f + '"]');
      if (sel) sel.addEventListener('change', buildConflicts);
    });
    document.querySelectorAll('input[name="modules_override"]').forEach(function (cb) {
      cb.addEventListener('change', buildConflicts);
    });
  });
})();
</script>
{% endblock %}
