{% extends "admin/change_list.html" %}
{% block content %}

<div style="display:grid;grid-template-columns:repeat(4,1fr);
            gap:12px;margin-bottom:20px">

  <div style="background:var(--darkened-bg,#111d2b);border:1px solid var(--border-color,#1e2d3d);
              border-radius:8px;padding:16px;text-align:center">
    <div style="font-size:28px;font-weight:700">{{ total_count }}</div>
    <div style="font-size:12px;color:var(--body-quiet-color,#9aafbe)">Всього клієнтів</div>
  </div>

  <div style="background:var(--darkened-bg,#111d2b);border:1px solid #28a74533;
              border-radius:8px;padding:16px;text-align:center">
    <div style="font-size:28px;font-weight:700;color:#28a745">{{ active_count }}</div>
    <div style="font-size:12px;color:var(--body-quiet-color,#9aafbe)">Активних</div>
  </div>

  <div style="background:var(--darkened-bg,#111d2b);border:1px solid #17a2b833;
              border-radius:8px;padding:16px;text-align:center">
    <div style="font-size:28px;font-weight:700;color:#17a2b8">{{ trial_count }}</div>
    <div style="font-size:12px;color:var(--body-quiet-color,#9aafbe)">Пробний</div>
  </div>

  <div style="background:var(--darkened-bg,#111d2b);border:1px solid #dc354533;
              border-radius:8px;padding:16px;text-align:center">
    <div style="font-size:28px;font-weight:700;color:#dc3545">{{ expired_count|add:pending_count }}</div>
    <div style="font-size:12px;color:var(--body-quiet-color,#9aafbe)">Очікують / Прострочено</div>
  </div>

</div>

{{ block.super }}
{% endblock %}
